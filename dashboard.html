<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAYGO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getDatabase, ref, get, child, update } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
        
        window.firebaseApp = { initializeApp, getAuth, onAuthStateChanged, signOut, getDatabase, ref, get, child, update };
    </script>
</head>
<body>
    <!-- Content is hidden until license verified -->
    <div class="app locked" id="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="logo">F</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="nav-item" id="logout-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <header class="header">
                <div class="header-left">
                    <h1>Dashboard</h1>
                </div>
                <div class="header-right">
                    <div class="user-pill">
                        <span class="user-avatar" id="user-avatar">U</span>
                        <span class="user-name" id="user-name">Loading...</span>
                    </div>
                </div>
            </header>

            <div class="content">
                <!-- Stats Row -->
                <div class="stats-row">
                    <div class="stat-item">
                        <span class="stat-label">Status</span>
                        <span class="stat-value verified">Verified</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <span class="stat-label">Member Since</span>
                        <span class="stat-value" id="member-since">-</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <span class="stat-label">License</span>
                        <span class="stat-value" id="license-status">-</span>
                    </div>
                    <div class="stat-divider" id="license-expiry-divider" style="display: none;"></div>
                    <div class="stat-item" id="license-expiry-item" style="display: none;">
                        <span class="stat-label">Expires</span>
                        <span class="stat-value" id="license-expiry">-</span>
                    </div>
                </div>

                <!-- Downloads Section -->
                <div class="downloads-section">
                    <h2 class="section-title">Downloads</h2>
                    
                    <div class="download-item main-download">
                        <div class="download-info">
                            <div class="download-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="7 10 12 15 17 10"></polyline>
                                    <line x1="12" y1="15" x2="12" y2="3"></line>
                                </svg>
                            </div>
                            <div class="download-text">
                                <span class="download-name">Faygo Loader</span>
                                <span class="download-desc">Main application</span>
                            </div>
                        </div>
                        <a href="loader.exe" download class="download-btn" id="download-btn">Download</a>
                    </div>

                    <div class="download-item">
                        <div class="download-info">
                            <div class="download-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                                </svg>
                            </div>
                            <div class="download-text">
                                <span class="download-name">DirectX Web Setup</span>
                                <span class="download-desc">Fix for d3dcompiler_47.dll not found</span>
                            </div>
                        </div>
                        <a href="https://download.microsoft.com/download/1/7/1/1718ccc4-6315-4d8e-9543-8e28a4e18c4c/dxwebsetup.exe" class="download-btn secondary">Download</a>
                    </div>

                    <div class="download-item">
                        <div class="download-info">
                            <div class="download-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                                    <line x1="8" y1="21" x2="16" y2="21"></line>
                                    <line x1="12" y1="17" x2="12" y2="21"></line>
                                </svg>
                            </div>
                            <div class="download-text">
                                <span class="download-name">Visual C++ Redistributable</span>
                                <span class="download-desc">All-in-One runtimes package</span>
                            </div>
                        </div>
                        <a href="https://www.techpowerup.com/download/visual-c-redistributable-runtime-package-all-in-one/" target="_blank" class="download-btn secondary">Download</a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- License Modal -->
    <div class="modal-overlay" id="license-modal">
        <div class="modal">
            <button class="modal-close" id="close-license-modal">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="modal-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
                </svg>
            </div>
            <h2>License Key</h2>
            <p>Enter your key to continue</p>
            <form id="license-form">
                <input type="text" id="license-key-input" placeholder="XXXXX-XXXXX-XXXXX" required>
                <button type="submit" class="btn-primary" id="verify-license-btn">
                    <span class="btn-text">Verify</span>
                    <span class="btn-loader"></span>
                </button>
            </form>
        </div>
    </div>
    
    <script src="dashboard.js"></script>
</body>
</html>
